name: Test & Deploy

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sigdoc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/sigdoc_test
      SECRET_KEY: test-secret-key-for-ci
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: backend
        run: pytest --tb=short -q

  test-frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        working-directory: frontend
        run: pnpm tsc --noEmit

      - name: Build
        working-directory: frontend
        run: pnpm build

  deploy:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: success()
    permissions:
      contents: read

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd /opt/docker/apps/sigdoc

            # Pull latest code
            git pull origin main

            # Build services separately to catch failures
            docker compose -f docker-compose.prod.yml build api
            docker compose -f docker-compose.prod.yml build frontend

            # Only restart after BOTH builds succeed
            docker compose -f docker-compose.prod.yml up -d

            # Run migrations (idempotent — safe to run every deploy)
            docker compose -f docker-compose.prod.yml exec -T api alembic upgrade head

            # Post-deploy smoke test
            sleep 5
            API_STATUS=$(docker compose -f docker-compose.prod.yml exec -T api curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/health)
            if [ "$API_STATUS" != "200" ]; then
              echo "❌ API health check failed (HTTP $API_STATUS)"
              exit 1
            fi

            # Clean up old images
            docker image prune -f

            echo "✅ SigDoc deployed successfully (API healthy)"

