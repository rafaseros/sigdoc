name: Test & Deploy

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sigdoc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/sigdoc_test
      SECRET_KEY: test-secret-key-for-ci
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: backend
        run: pytest --tb=short -q

  test-frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: corepack enable

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        working-directory: frontend
        run: pnpm tsc --noEmit

      - name: Run tests
        working-directory: frontend
        run: pnpm test

      - name: Build
        working-directory: frontend
        run: pnpm build

  build-api:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api.prod
          push: true
          tags: |
            ghcr.io/rafaseros/sigdoc-api:latest
            ghcr.io/rafaseros/sigdoc-api:sha-${{ github.sha }}
          cache-from: type=gha,scope=sigdoc-api
          cache-to: type=gha,mode=max,scope=sigdoc-api

  build-frontend:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend.prod
          push: true
          tags: |
            ghcr.io/rafaseros/sigdoc-frontend:latest
            ghcr.io/rafaseros/sigdoc-frontend:sha-${{ github.sha }}
          cache-from: type=gha,scope=sigdoc-frontend
          cache-to: type=gha,mode=max,scope=sigdoc-frontend

  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: [build-api, build-frontend]
    if: success()
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            set -e

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            cd /opt/docker/apps/sigdoc

            # Pull latest compose files and config (images themselves come from GHCR)
            git pull origin main

            # Pull pre-built images — the droplet never builds, it only pulls
            docker compose -f docker-compose.prod.yml pull api frontend

            # Recreate containers with the freshly pulled images
            docker compose -f docker-compose.prod.yml up -d

            # Run migrations (idempotent — safe to run every deploy)
            docker compose -f docker-compose.prod.yml exec -T api alembic upgrade head

            # Post-deploy smoke test
            sleep 5
            API_STATUS=$(docker compose -f docker-compose.prod.yml exec -T api curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/health)
            if [ "$API_STATUS" != "200" ]; then
              echo "❌ API health check failed (HTTP $API_STATUS)"
              exit 1
            fi

            # Clean up old images
            docker image prune -f

            docker logout ghcr.io

            echo "✅ SigDoc deployed successfully (API healthy)"
