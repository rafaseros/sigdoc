name: Test & Deploy

on:
  push:
    branches:
      - main
  # PRs targeting main run ONLY the test/build-check jobs (test-backend,
  # test-frontend). The image build-push and droplet deploy jobs are gated to
  # push events via job-level `if:` conditions below, so they never run on PRs.
  pull_request:
    branches:
      - main

# Serialize production deploys so overlapping pushes to main don't interleave.
# cancel-in-progress: false lets an in-flight deploy finish before the next runs.
concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sigdoc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/sigdoc_test
      SECRET_KEY: test-secret-key-for-ci
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: backend
        run: pytest --tb=short -q

  test-frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: corepack enable

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        working-directory: frontend
        run: pnpm tsc --noEmit

      - name: Run tests
        working-directory: frontend
        run: pnpm test

      - name: Build
        working-directory: frontend
        run: pnpm build

  build-api:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    # Only build/push images on push to main — PRs stop at the test jobs above.
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api.prod
          push: true
          tags: |
            ghcr.io/rafaseros/sigdoc-api:latest
            ghcr.io/rafaseros/sigdoc-api:sha-${{ github.sha }}
          cache-from: type=gha,scope=sigdoc-api
          cache-to: type=gha,mode=max,scope=sigdoc-api

  build-frontend:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    # Only build/push images on push to main — PRs stop at the test jobs above.
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend.prod
          push: true
          tags: |
            ghcr.io/rafaseros/sigdoc-frontend:latest
            ghcr.io/rafaseros/sigdoc-frontend:sha-${{ github.sha }}
          cache-from: type=gha,scope=sigdoc-frontend
          cache-to: type=gha,mode=max,scope=sigdoc-frontend

  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: [build-api, build-frontend]
    # Deploy only on push to main, and only if both image builds succeeded.
    # On PRs the build jobs are skipped, so this job is skipped too.
    if: success() && github.event_name == 'push'
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            set -e

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            cd /opt/docker/apps/sigdoc

            # Deploy the immutable, per-commit build (sha-<gitsha>) instead of the
            # mutable :latest tag, so this deploy is reproducible and can be rolled
            # back to any prior commit (see scripts/rollback.sh). docker-compose.prod.yml
            # substitutes ${SIGDOC_IMAGE_TAG:-latest}; the build jobs push
            # ghcr.io/rafaseros/sigdoc-{api,frontend}:sha-<gitsha>.
            export SIGDOC_IMAGE_TAG="sha-${{ github.sha }}"

            # Pull latest compose files and config (images themselves come from GHCR)
            git pull origin main

            # Pull pre-built images — the droplet never builds, it only pulls
            docker compose -f docker-compose.prod.yml pull api frontend

            # Run migrations BEFORE recreating the api, in a one-off container built
            # from the freshly pulled image (`run --rm` uses a throwaway container and
            # never touches the running sigdoc-api). `set -e` makes a migration failure
            # abort the deploy right here — so the old api keeps serving the old schema
            # and new code never runs against a half-migrated database. Idempotent when
            # there are no pending migrations.
            docker compose -f docker-compose.prod.yml run --rm api alembic upgrade head

            # Migrations succeeded — recreate containers with the freshly pulled images
            docker compose -f docker-compose.prod.yml up -d

            # Post-deploy smoke test — poll until the freshly-recreated api is
            # listening. A single early curl races uvicorn startup (connection
            # refused -> curl exit 7 -> set -e aborts) even though the container
            # becomes healthy seconds later (healthcheck start_period is 15s).
            # `|| echo 000` keeps set -e from aborting on a not-yet-ready curl.
            API_OK=0
            for i in $(seq 1 30); do
              API_STATUS=$(docker compose -f docker-compose.prod.yml exec -T api curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/health 2>/dev/null || echo "000")
              if [ "$API_STATUS" = "200" ]; then
                API_OK=1
                echo "API healthy after ${i} attempt(s)"
                break
              fi
              sleep 2
            done
            if [ "$API_OK" != "1" ]; then
              echo "❌ API health check failed (last HTTP $API_STATUS)"
              exit 1
            fi

            # Clean up old images
            docker image prune -f

            docker logout ghcr.io

            echo "✅ SigDoc deployed successfully (API healthy)"
