services:
  db:
    image: postgres:16-alpine
    container_name: sigdoc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sigdoc-network

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: sigdoc-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sigdoc-network

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: sigdoc-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set sigdoc http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing sigdoc/templates;
      mc mb --ignore-existing sigdoc/documents;
      echo 'Buckets created';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - sigdoc-network

  gotenberg:
    image: gotenberg/gotenberg:8.16
    container_name: sigdoc-gotenberg
    restart: unless-stopped
    # Chromium (via Gotenberg) is the service most likely to balloon in RAM
    # during PDF conversion — cap it so one large job can't OOM the host.
    # mem_limit is a cap (not a reservation). No cpus cap: the droplet has a
    # single CPU, so a cpus limit is either a no-op (1.0) or rejected (>1.0).
    mem_limit: 1g
    # Port 3000 is internal-only — Gotenberg must NOT be exposed externally
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sigdoc-network

  api:
    image: ghcr.io/rafaseros/sigdoc-api:latest
    container_name: sigdoc-api
    restart: unless-stopped
    # Memory cap for this single small droplet (1 CPU / ~2 GB) — prevent one
    # runaway container from OOM-ing the whole host. mem_limit is a cap, not a
    # reservation. No cpus cap: with a single CPU a cpus limit is a no-op at 1.0
    # or rejected by Docker above 1.0.
    mem_limit: 768m
    # env_file forwards ALL variables from /opt/docker/apps/sigdoc/.env to the container.
    # This covers SMTP_*, FRONTEND_URL, EMAIL_BACKEND, GOTENBERG_*, ENABLE_DEV_RESET, etc.
    # The explicit environment block below OVERRIDES compose-computed values that differ
    # from what is in .env (internal Docker hostnames, MINIO_SECURE=false, etc.).
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      gotenberg:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      MINIO_ENDPOINT: minio:9000
      MINIO_EXTERNAL_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_SECURE: "false"
      DEBUG: "false"
      API_V1_PREFIX: /api/v1
      # SECURITY: pin the dev admin-reset HTTP endpoint OFF in production.
      # This explicit value OVERRIDES anything in .env (env_file above), so the
      # unauthenticated recovery route can never be mounted here regardless of
      # .env drift. Production admin recovery is server-side only (scripts/reset-admin.sh).
      ENABLE_DEV_RESET: "false"
      # Trust proxy headers from any peer. The api is reachable ONLY through Traefik
      # on the internal docker network (no host port is published), so X-Forwarded-For
      # is always set by Traefik. uvicorn runs with --proxy-headers but no
      # --forwarded-allow-ips (see docker/Dockerfile.api.prod), so without this it
      # falls back to trusting only 127.0.0.1 and every client is seen as Traefik's
      # IP — collapsing per-IP rate limiting (login 5/min, signup 3/hour) and audit
      # logging into one shared bucket. uvicorn reads FORWARDED_ALLOW_IPS from the env.
      FORWARDED_ALLOW_IPS: "*"
      # Pin CORS to the production origin (matches the Traefik Host() labels below).
      # config.py types cors_origins as list[str], which pydantic-settings parses
      # from the env as JSON — a bare string raises SettingsError at boot, so this
      # value MUST be a JSON array.
      CORS_ORIGINS: '["https://sigdoc.devrafaseros.com"]'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - sigdoc-network
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sigdoc-api.rule=Host(`sigdoc.devrafaseros.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.sigdoc-api.entrypoints=websecure"
      - "traefik.http.routers.sigdoc-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.sigdoc-api.loadbalancer.server.port=8000"

  frontend:
    image: ghcr.io/rafaseros/sigdoc-frontend:latest
    container_name: sigdoc-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - sigdoc-network
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sigdoc-web.rule=Host(`sigdoc.devrafaseros.com`)"
      - "traefik.http.routers.sigdoc-web.entrypoints=websecure"
      - "traefik.http.routers.sigdoc-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.sigdoc-web.loadbalancer.server.port=80"

volumes:
  pgdata:
  miniodata:

networks:
  sigdoc-network:
    driver: bridge
  traefik-public:
    external: true
