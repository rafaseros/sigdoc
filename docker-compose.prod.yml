services:
  db:
    image: postgres:16-alpine
    container_name: sigdoc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sigdoc-network

  minio:
    image: minio/minio:latest
    container_name: sigdoc-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sigdoc-network

  minio-init:
    image: minio/mc:latest
    container_name: sigdoc-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set sigdoc http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing sigdoc/templates;
      mc mb --ignore-existing sigdoc/documents;
      echo 'Buckets created';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - sigdoc-network

  gotenberg:
    image: gotenberg/gotenberg:8.16
    container_name: sigdoc-gotenberg
    restart: unless-stopped
    # Port 3000 is internal-only — Gotenberg must NOT be exposed externally
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sigdoc-network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api.prod
    container_name: sigdoc-api
    restart: unless-stopped
    # env_file forwards ALL variables from /opt/docker/apps/sigdoc/.env to the container.
    # This covers SMTP_*, FRONTEND_URL, EMAIL_BACKEND, GOTENBERG_*, ENABLE_DEV_RESET, etc.
    # The explicit environment block below OVERRIDES compose-computed values that differ
    # from what is in .env (internal Docker hostnames, MINIO_SECURE=false, etc.).
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      gotenberg:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      MINIO_ENDPOINT: minio:9000
      MINIO_EXTERNAL_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_SECURE: "false"
      DEBUG: "false"
      API_V1_PREFIX: /api/v1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - sigdoc-network
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sigdoc-api.rule=Host(`sigdoc.devrafaseros.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.sigdoc-api.entrypoints=websecure"
      - "traefik.http.routers.sigdoc-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.sigdoc-api.loadbalancer.server.port=8000"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend.prod
    container_name: sigdoc-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - sigdoc-network
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sigdoc-web.rule=Host(`sigdoc.devrafaseros.com`)"
      - "traefik.http.routers.sigdoc-web.entrypoints=websecure"
      - "traefik.http.routers.sigdoc-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.sigdoc-web.loadbalancer.server.port=80"

volumes:
  pgdata:
  miniodata:

networks:
  sigdoc-network:
    driver: bridge
  traefik-public:
    external: true
